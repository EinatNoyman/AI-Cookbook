<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AI Cookbook</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Redirects all 404s back to index.html with the path encoded as a query param
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? '&' + l.search.slice(1) : '') + l.hash)
      );
    </script>
  </head>
</html>
